services:
  fixity_master:
    image: acrdiaanlnznsbx.azurecr.io/fixity-master:latest
    container_name: "fixity_master"
    restart: always
    ports:
      - "8081:3000"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ROSETTA_PDS_URL=${ROSETTA_PDS_URL:-https://slbpdstest.natlib.govt.nz/pds}
      - CONNECTION_STRING=${CONNECTION_STRING:-DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://localhost:10000/devstoreaccount1;QueueEndpoint=http://localhost:10001/devstoreaccount1;TableEndpoint=http://localhost:10002/devstoreaccount1;}
      - AZURE_WEB_JOBS_STORAGE=${AZURE_WEB_JOBS_STORAGE:-DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://localhost:10000/devstoreaccount1;QueueEndpoint=http://localhost:10001/devstoreaccount1;TableEndpoint=http://localhost:10002/devstoreaccount1;}
      - QUEUE_POLL_INTERVAL_SECONDS=${QUEUE_POLL_INTERVAL_SECONDS:-0.1}
      - QUEUE_RECEIVE_BATCH_SIZE=${QUEUE_RECEIVE_BATCH_SIZE:-32}
      - QUEUE_VISIBILITY_TIMEOUT_SECONDS=${QUEUE_VISIBILITY_TIMEOUT_SECONDS:-30}
      - QUEUE_MAX_DEQUEUE_COUNT=${QUEUE_MAX_DEQUEUE_COUNT:-5}
      - QUEUE_URL_PREFIX=${QUEUE_URL_PREFIX:-http://127.0.0.1:10001/devstoreaccount1}
      - QUEUE_ACCOUNT_NAME=${QUEUE_ACCOUNT_NAME:-devstoreaccount1}
      - CONTAINER_NAME=${CONTAINER_NAME:-fixity-dev}
      - FIXITY_WORKER_URL=${FIXITY_WORKER_URL:-http://worker:7071}
      - FIXITY_WORKER_FUNC_KEY_BATCH_STARTER=${FIXITY_WORKER_FUNC_KEY_BATCH_STARTER:-}
      - FIXITY_WORKER_FUNC_KEY_SINGLE_FILE=${FIXITY_WORKER_FUNC_KEY_SINGLE_FILE:-}
      - FIXITY_WORKER_FUNC_KEY_SINGLE_METS=${FIXITY_WORKER_FUNC_KEY_SINGLE_METS:-}
      - FIXITY_SSL_VERIFY=${FIXITY_SSL_VERIFY:-true}
      - FIXITY_CA_BUNDLE=${FIXITY_CA_BUNDLE:-fixity.cert}
      - ROSETTA_DB_HOSTNAME=${ROSETTA_DB_HOSTNAME:-oracle}
      - ROSETTA_DB_PORT=${ROSETTA_DB_PORT:-1521}
      - ROSETTA_DB_USERNAME=${ROSETTA_DB_USERNAME:-fixity}
      - ROSETTA_DB_PASSWORD=${ROSETTA_DB_PASSWORD:-fixity}
      - ROSETTA_DB_SID=${ROSETTA_DB_SID}
      - ROSETTA_DB_SERVICE_NAME=${ROSETTA_DB_SERVICE_NAME}
      - ROSETTA_DB_SCHEMAPREFIX=${ROSETTA_DB_SCHEMAPREFIX}
      - DBMS_HOSTNAME=${DBMS_HOSTNAME:-postgres}
      - DBMS_PORT=${DBMS_PORT:-5432}
      - DBMS_USERNAME=${DBMS_USERNAME:-fixity}
      - DBMS_PASSWORD=${DBMS_PASSWORD:-fixity}
      - DB_NAME=${DB_NAME:-fixity}
      - OPTIONAL_DB_TABLES=${OPTIONAL_DB_TABLES:-}
      - LDAP_ENABLED=${LDAP_ENABLED:-true}
      - LDAP_URL=${LDAP_URL:-ldap://wlgprddc15.dia.govt.nz:389}
      - LDAP_USRSEARCHBASE=${LDAP_USRSEARCHBASE:-dc=dia,dc=govt,dc=nz}
      - LDAP_USRSEARCHFILTER=${LDAP_USRSEARCHFILTER:-(sAMAccountName={})}
      - LDAP_GROUPSEARCHBASE=${LDAP_GROUPSEARCHBASE:-}
      - LDAP_GROUPSEARCHFILTER=${LDAP_GROUPSEARCHFILTER:-}
      - LDAP_CONTEXTSOURCE_ROOT=${LDAP_CONTEXTSOURCE_ROOT:-}
      - LDAP_CONTEXTSOURCE_MANAGER_DN=${LDAP_CONTEXTSOURCE_MANAGER_DN:-}
      - LDAP_CONTEXTSOURCE_MANAGER_PASSWORD=${LDAP_CONTEXTSOURCE_MANAGER_PASSWORD:-}
      - MAIL_PROTOCOL=${MAIL_PROTOCOL:-SMTP}
      - MAIL_SMTP_HOST=${MAIL_SMTP_HOST:-localhost}
      - MAIL_SMTP_PORT=${MAIL_SMTP_PORT:-25}
      - STORAGE_DIR=${STORAGE_DIR:-storage}
      - ACCOUNT_NAME=${ACCOUNT_NAME:-devstoreaccount1}
      - ACCOUNT_KEY=${ACCOUNT_KEY:-Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==}
      - AUTH_MODE=${AUTH_MODE:-azurite}
      - VERSION=${VERSION:-2.0.0}
      - TEST_MODE=${TEST_MODE:-false}
      - EXPIRE_INTERVAL=${EXPIRE_INTERVAL:-1800}
      - BOOTSTRAP_PASSWORD=${BOOTSTRAP_PASSWORD:-password}
      - API_PORT=${API_PORT:-3000}
      - BATCH_SIZE=${BATCH_SIZE:-200}
      - MAX_WORKERS=${MAX_WORKERS:-10}
      - CONTENT_READ_BUFFER_SIZE=${CONTENT_READ_BUFFER_SIZE:-10485760}
      - MAX_RUNNING_MILLIONS=${MAX_RUNNING_MILLIONS:-180000}
      - MAX_WORKER_TIMEOUT_HOURS=${MAX_WORKER_TIMEOUT_HOURS:-24}
      - PERSISTENT_STORAGE=${PERSISTENT_STORAGE:-/persistent/fixity}
      - BLOB_URL_PREFIX=${BLOB_URL_PREFIX:-http://localhost:10000/devstoreaccount1/fixity-dev}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-frank.lee@dia.govt.nz}
      - MANAGED_IDENTITY_CLIENT_ID=${MANAGED_IDENTITY_CLIENT_ID:-}
      - MANAGED_IDENTITY_TOKEN_URL=${MANAGED_IDENTITY_TOKEN_URL:-http://169.254.169.254/metadata/identity/oauth2/token}
      - FIXITY_WORKER_FUNC_HOSTS_KEY=${FIXITY_WORKER_FUNC_HOSTS_KEY:-}
    volumes:
      - /persistent/fixity:/persistent/fixity:Z
